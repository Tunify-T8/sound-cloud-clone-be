openapi: 3.0.0
info:
  title: SoundCloud Clone — Full API
  description: >
    Combined API documentation for all modules of the SoundCloud-like social streaming platform.
    Covers Authentication, Users, Followers, Track Upload & Management (Module 4),
    Playback & Streaming (Module 5), Engagement (Module 6), Playlists (Module 7),
    Feed / Search & Discovery (Module 8), Messaging & Track Sharing (Module 9),
    Real-Time Notifications (Module 10), Moderation & Admin Dashboard (Module 11),
    and Premium Subscription (Module 12).

    **Authentication:** All endpoints require a Bearer JWT token in the
    `Authorization` header unless marked as public. The authenticated
    user's identity is always derived from the token — never passed in
    the request body.

    **Error format:** All errors follow the unified `ErrorResponse` schema.

    **Pagination:** All paginated endpoints accept `page` and `limit` as
    query parameters and return a `meta` object or inline pagination fields.
  version: 1.0.0

servers:
  - url: http://localhost:3000
    description: Local development server

security:
  - bearerAuth: []

tags:
  - name: Authentication
    description: Authentication and user account management
  - name: Users
    description: User profile and identity
  - name: Followers
    description: Followers and social graph
  - name: Module 4 — Track Upload
    description: Track upload and management
  - name: Module 5 — Playback
    description: Playback and streaming engine
  - name: Module 6 — Engagement
    description: Likes, reposts, and comments
  - name: Module 7 — Playlists
    description: Playlist management
  - name: Module 8 — Feed & Discovery
    description: Feed, search, and discovery
  - name: Module 9 — Messaging
    description: Messaging and track sharing
  - name: Module 10 — Notifications
    description: Real-time notifications
  - name: Module 11 — Reports (User-Facing)
    description: User-facing report submission
  - name: Module 11 — Admin Reports
    description: Admin report queue management
  - name: Module 11 — Admin Content
    description: Admin track and comment moderation
  - name: Module 11 — Admin Users
    description: Admin user moderation
  - name: Module 11 — Admin Analytics
    description: Admin platform analytics
  - name: Module 12 — Subscription
    description: Premium subscription management

# ==============================================================================
# PATHS
# ==============================================================================
paths:

  # ============================================================================
  # MODULES 1–3 — Authentication, Users, Followers
  # ============================================================================

  /auth/register:
    post:
      tags: [Authentication]
      summary: Register a new user
      description: Creates a new user account and returns authentication tokens.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/auth_register_body"
      responses:
        "201":
          description: User successfully registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email or username already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      tags: [Authentication]
      summary: Login user
      description: Authenticates a user and returns access and refresh tokens.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/auth_login_body"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200"
        "400":
          description: Missing or invalid request data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid email or password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Email not verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/refresh-token:
    post:
      tags: [Authentication]
      summary: Refresh access token
      description: Generates a new access token using a valid refresh token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/auth_refreshtoken_body"
      responses:
        "200":
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_1"
        "400":
          description: Missing refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Invalid, revoked, or expired token"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      tags: [Authentication]
      summary: Logout user
      description: Revokes the provided refresh token and logs the user out.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/auth_logout_body"
      responses:
        "200":
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_2"
        "400":
          description: Missing refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid or revoked refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/verify-email:
    post:
      tags: [Authentication]
      summary: Verify email
      description: Verifies a user's email using a verification token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/auth_verifyemail_body"
      responses:
        "200":
          description: Email verified successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_3"
        "400":
          description: Missing verification token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid or expired verification token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/resend-verification:
    post:
      tags: [Authentication]
      summary: Resend email verification
      description: Sends a new verification email to the user if they are not verified.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/auth_resendverification_body"
      responses:
        "200":
          description: Verification email sent successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_4"
        "400":
          description: User already verified or missing email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/forgot-password:
    post:
      tags: [Authentication]
      summary: Request password reset
      description: Generates a password reset token and sends it via email.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/auth_forgotpassword_body"
      responses:
        "200":
          description: Password reset email sent successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_5"
        "400":
          description: Missing email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/reset-password:
    post:
      tags: [Authentication]
      summary: Reset password
      description: Updates a user's password using a valid password reset token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/auth_resetpassword_body"
      responses:
        "200":
          description: Password reset successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_6"
        "400":
          description: Missing token or password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/oauth-login:
    post:
      tags: [Authentication]
      summary: Social login via OAuth
      description: Authenticates or registers a user using a third-party OAuth provider.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/auth_oauthlogin_body"
      responses:
        "200":
          description: OAuth login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200"
        "400":
          description: Missing provider or token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid OAuth token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/delete-account:
    delete:
      tags: [Authentication]
      summary: Delete user account
      description: >
        Permanently deletes the authenticated user's account.
        Password confirmation in the body is optional but recommended for extra security.
      parameters:
        - name: Authorization
          in: header
          description: Bearer <accessToken>
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/auth_deleteaccount_body"
      responses:
        "200":
          description: Account deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_7"
        "400":
          description: Invalid password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized (missing/invalid token)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/me:
    get:
      tags: [Users]
      summary: Get current user profile
      description: Returns the full profile of the authenticated user, including social stats and likes received.
      parameters:
        - name: Authorization
          in: header
          description: Bearer <accessToken>
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Current user profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_8"
        "401":
          description: Unauthorized (missing/invalid token)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden (inactive or soft-deleted account)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/me/profile:
    patch:
      tags: [Users]
      summary: Update current user profile
      description: Allows the authenticated user to update their profile information.
      parameters:
        - name: Authorization
          in: header
          description: Bearer <accessToken>
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/me_profile_body"
      responses:
        "200":
          description: Profile updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_9"
        "400":
          description: "Invalid input (e.g., username exists, invalid field)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized (missing/invalid token)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden (inactive or soft-deleted account)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{userIdOrUsername}:
    get:
      tags: [Users]
      summary: Get public user profile
      description: Returns the public profile of a user by ID or username, only if their profile is visible (PUBLIC).
      parameters:
        - name: userIdOrUsername
          in: path
          description: The ID or username of the target user
          required: true
          schema:
            type: string
        - name: Authorization
          in: header
          description: Optional Bearer token for authenticated requests
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Public user profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_10"
        "404":
          description: User not found or profile is private
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/me/social-links:
    get:
      tags: [Users]
      summary: Get social links of current user
      description: Returns all social links for the authenticated user.
      parameters:
        - name: Authorization
          in: header
          description: Bearer <accessToken>
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Social links retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_11"
        "401":
          description: Unauthorized (missing or invalid token)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/me/social-links_update:
    patch:
      tags: [Users]
      summary: Update social links of current user
      description: Add or update the authenticated user's social links.
      parameters:
        - name: Authorization
          in: header
          description: Bearer <accessToken>
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/me_sociallinks_update_body"
      responses:
        "200":
          description: Social links updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_12"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized (missing or invalid token)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/me/genres:
    get:
      tags: [Users]
      summary: Get favorite genres of current user
      description: Returns the list of favorite genres the authenticated user has selected.
      parameters:
        - name: Authorization
          in: header
          description: Bearer <accessToken>
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Favorite genres retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_13"
        "401":
          description: Unauthorized (missing or invalid token)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/me/genres-update:
    patch:
      tags: [Users]
      summary: Update favorite genres of current user
      description: Update the list of favorite genres the authenticated user wants to display.
      parameters:
        - name: Authorization
          in: header
          description: Bearer <accessToken>
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/me_genresupdate_body"
      responses:
        "200":
          description: Favorite genres updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_14"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized (missing or invalid token)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/me/tracks:
    get:
      tags: [Users]
      summary: Get uploaded tracks of current user
      description: Returns a paginated list of tracks uploaded by the authenticated user.
      parameters:
        - name: Authorization
          in: header
          description: Bearer <accessToken>
          required: true
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Tracks retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_15"
        "401":
          description: Unauthorized (missing or invalid token)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{userId}/follow:
    post:
      tags: [Followers]
      summary: Follow a user
      description: Allows the authenticated user to follow another user.
      parameters:
        - name: Authorization
          in: header
          description: Bearer <accessToken>
          required: true
          schema:
            type: string
        - name: userId
          in: path
          description: ID of the user to follow
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User followed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_16"
        "400":
          description: Cannot follow yourself or already following
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized (missing or invalid token)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{userId}/unfollow:
    delete:
      tags: [Followers]
      summary: Unfollow a user
      description: Allows the authenticated user to unfollow a user they are currently following.
      parameters:
        - name: Authorization
          in: header
          description: Bearer <accessToken>
          required: true
          schema:
            type: string
        - name: userId
          in: path
          description: ID of the user to unfollow
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User unfollowed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_17"
        "400":
          description: You are not following this user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized (missing or invalid token)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{userId}/followers:
    get:
      tags: [Followers]
      summary: Get followers of a user
      description: Returns a paginated list of users who follow the specified user.
      parameters:
        - name: userId
          in: path
          description: ID of the user whose followers will be retrieved
          required: true
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Followers retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_18"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{userId}/mutual-friends:
    get:
      tags: [Users]
      summary: Get mutual friends
      description: Returns the list of users that both the authenticated user and the specified user follow.
      parameters:
        - name: userId
          in: path
          description: ID of the user to compare mutual friends with
          required: true
          schema:
            type: string
        - name: Authorization
          in: header
          description: Bearer <accessToken>
          required: true
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Mutual friends retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_19"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{userId}/follow-status:
    get:
      tags: [Users]
      summary: Get follow status
      description: Returns the follow relationship between the authenticated user and the specified user.
      parameters:
        - name: userId
          in: path
          description: ID of the user
          required: true
          schema:
            type: string
        - name: Authorization
          in: header
          description: Bearer <accessToken>
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Follow status retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_20"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{userId}/following:
    get:
      tags: [Users]
      summary: Get following list
      description: Returns a paginated list of users that the specified user is following.
      parameters:
        - name: userId
          in: path
          description: ID of the user
          required: true
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Following list retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_21"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{userId}/block:
    post:
      tags: [Users]
      summary: Block a user
      description: Blocks the specified user. Removes any existing follow relationships.
      parameters:
        - name: userId
          in: path
          description: ID of the user to block
          required: true
          schema:
            type: string
        - name: Authorization
          in: header
          description: Bearer <accessToken>
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User blocked successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_22"
        "400":
          description: Cannot block yourself
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized (missing or invalid token)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{userId}/unblock:
    delete:
      tags: [Users]
      summary: Unblock a user
      description: Unblocks the specified user.
      parameters:
        - name: userId
          in: path
          description: ID of the user to unblock
          required: true
          schema:
            type: string
        - name: Authorization
          in: header
          description: Bearer <accessToken>
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User unblocked successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_23"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Block relationship not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/me/blocked-users:
    get:
      tags: [Users]
      summary: Get blocked users
      description: Returns a paginated list of users that the authenticated user has blocked.
      parameters:
        - name: Authorization
          in: header
          description: Bearer <accessToken>
          required: true
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Blocked users retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_24"
        "401":
          description: Unauthorized (missing or invalid token)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/me/suggested:
    get:
      tags: [Users]
      summary: Get suggested users
      description: |
        Returns a paginated list of suggested users for the authenticated user.
        Suggestions are based on mutual followers, favorite genres, activity, and popularity.
        Blocked users and private profiles are excluded.
      parameters:
        - name: Authorization
          in: header
          description: Bearer <accessToken>
          required: true
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: genre
          in: query
          description: Optional. Filter suggested users by a favorite genre.
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Suggested users retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_25"
        "401":
          description: Unauthorized (missing or invalid token)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ============================================================================
  # MODULE 4 — Track Upload & Management
  # ============================================================================

  /users/me/upload:
    get:
      operationId: getUserUploadQuota
      summary: Get User Tier & Upload Quota
      description: Get current user tier and remaining uploads. Called when entering the Upload Entry Screen.
      tags: [Module 4 — Track Upload]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current upload quota information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadQuota"
              example:
                tier: free
                uploadMinutesLimit: 180
                uploadMinutesUsed: 4
                uploadMinutesRemaining: 176
                canReplaceFiles: false
                canScheduleRelease: false
                canAccessAdvancedTab: false
        "401":
          $ref: "#/components/responses/Unauthorized"

  /tracks:
    post:
      operationId: createTrack
      summary: Create Track
      description: Creates track metadata before file upload.
      tags: [Module 4 — Track Upload]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTrackRequest"
      responses:
        "201":
          description: Track created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTrackResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          description: Upload quota exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error:
                  code: QUOTA_EXCEEDED
                  message: You have reached your upload limit for your tier.

  /tracks/{trackId}/audio:
    post:
      operationId: uploadAudioFile
      summary: Upload Audio File
      description: Upload the actual audio file (binary/multipart).
      tags: [Module 4 — Track Upload]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/trackId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [audioFile]
              properties:
                audioFile:
                  type: string
                  format: binary
      responses:
        "200":
          description: Upload accepted — backend starts processing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackStatusResponse"
        "400":
          description: Invalid file type or file too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /tracks/{trackId}/audio/replace:
    post:
      operationId: replaceAudioFile
      summary: Replace Audio File (Premium Only)
      description: Replace the audio file of an existing track. Only available for premium users.
      tags: [Module 4 — Track Upload]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/trackId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [newAudioFile]
              properties:
                newAudioFile:
                  type: string
                  format: binary
      responses:
        "200":
          description: Replacement accepted — track enters processing state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackStatusResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Feature requires premium tier

  /tracks/{trackId}/status:
    get:
      operationId: pollTrackStatus
      summary: Poll Track Status
      description: Flutter polls the backend to check whether the track finished processing.
      tags: [Module 4 — Track Upload]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/trackId"
      responses:
        "200":
          description: Current track processing status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackStatusPollResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Track not found

  /tracks/{trackId}:
    get:
      operationId: getTrackDetails
      summary: Get Track Details
      description: Display the full uploaded track information.
      tags: [Module 4 — Track Upload]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/trackId"
      responses:
        "200":
          description: Full track object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackDetails"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Track not found

    put:
      operationId: finalizeTrackMetadata
      summary: Finalize Upload / Update Metadata
      description: After upload, user completes metadata, adds artwork, and sets privacy.
      tags: [Module 4 — Track Upload]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/trackId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/FinalizeMetadataRequest"
      responses:
        "200":
          description: Metadata updated — track may still be processing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinalizeMetadataResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

    patch:
      operationId: editTrackMetadata
      summary: Edit Track Metadata / Privacy
      description: User updates metadata or changes privacy after upload.
      tags: [Module 4 — Track Upload]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/trackId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/EditTrackRequest"
      responses:
        "200":
          description: Track updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EditTrackResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Track not found

    delete:
      operationId: deleteTrack
      summary: Delete Track
      description: Soft delete. Track is hidden from public view but recoverable within 30 days.
      tags: [Module 4 — Track Upload]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/trackId"
      responses:
        "200":
          description: Track soft-deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  trackId:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum: [deleted]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Track not found

  /users/{userId}/artist-tools/upload-minutes:
    get:
      operationId: getArtistToolsUploadMinutes
      summary: Get Artist Tools Upload Minutes
      description: When opening Artist Tools, retrieve upload minutes usage.
      tags: [Module 4 — Track Upload]
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Upload minutes usage for the artist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtistToolsUploadMinutes"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ============================================================================
  # MODULE 5 — Playback & Streaming
  # ============================================================================

  /tracks/{trackId}/playback:
    get:
      tags: [Module 5 — Playback]
      summary: Get track playback bundle
      description: |
        Returns the full data bundle required to render the track player.
        The playability.status field drives player state.
      parameters:
        - name: trackId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: privateToken
          in: query
          required: false
          schema:
            type: string
          description: Secret token required to access private tracks shared via link.
      responses:
        "200":
          description: Playback bundle returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackPlaybackBundle"
        "403":
          description: Track is blocked for this user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Track not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tracks/{trackId}/stream:
    post:
      tags: [Module 5 — Playback]
      summary: Request a signed streaming URL
      description: Generates and returns a signed, time-limited URL for audio playback.
      parameters:
        - name: trackId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                quality:
                  type: string
                  enum: [auto, "128", "320"]
                  default: auto
            example:
              quality: auto
      responses:
        "200":
          description: Signed streaming URL issued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreamResponse"
        "403":
          description: Track is not accessible for this user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Track not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /me/playback/events:
    patch:
      tags: [Module 5 — Playback]
      summary: Report a playback action
      description: |
        Single endpoint for all player state updates. The backend routes
        internally based on the action field.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [trackId, action, positionSeconds]
              properties:
                trackId:
                  type: string
                  format: uuid
                action:
                  type: string
                  enum: [play, progress, pause]
                positionSeconds:
                  type: integer
                  minimum: 0
            example:
              trackId: track-uuid
              action: play
              positionSeconds: 0
      responses:
        "200":
          description: Playback state updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Playback state updated
        "404":
          description: Track not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /playback/context:
    post:
      tags: [Module 5 — Playback]
      summary: Build playback queue from context
      description: Resolves a source context into an ordered list of track IDs for the playback queue.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaybackContextRequest"
      responses:
        "200":
          description: Playback queue built successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaybackContextResponse"
        "404":
          description: Context resource not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /me/listening-history:
    get:
      tags: [Module 5 — Playback]
      summary: Get authenticated user's listening history
      description: Returns a paginated list of tracks the authenticated user has played.
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 50
      responses:
        "200":
          description: Listening history returned.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/HistoryTrack"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
        "401":
          description: Missing or invalid JWT token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ============================================================================
  # MODULE 6 — Engagement (Likes, Reposts, Comments)
  # ============================================================================

  /tracks/{trackId}/like:
    post:
      operationId: likeTrack
