    # ==========================================================================
    # MODULE 4 — Track Upload Schemas
    # ==========================================================================

    Genre:
      type: string
      description: Web sends genre as a flat string. Grouped by category for UI display.
      enum:
        - music_hiphop
        - music_electronic
        - music_pop
        - music_rnb
        - music_rock
        - music_jazz
        - music_classical
        - music_reggae
        - music_afrobeats
        - music_arabic
        - podcast_tech
        - podcast_comedy
        - podcast_news
        - podcast_education
        - podcast_business
        - audiobook_fiction
        - audiobook_nonfiction
        - other

    Availability:
      type: object
      properties:
        type:
          type: string
          enum: [worldwide, exclusive_regions, excluded_regions]
        regions:
          type: array
          items:
            type: string
          example: ["US", "CA"]

    Licensing:
      type: object
      properties:
        type:
          type: string
          enum: [all_rights_reserved, creative_commons]
