  # ============================================================================
  # MODULE 12 — Premium Subscription
  # ============================================================================

  /subscription/plans:
    get:
      tags: [Module 12 — Subscription]
      summary: Get available subscription plans
      description: Returns the list of available subscription plans including pricing and feature limits.
      responses:
        "200":
          description: List of subscription plans
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanListResponse"

  /subscription/me:
    get:
      tags: [Module 12 — Subscription]
      summary: Get current user subscription
      description: Returns the subscription status for the authenticated user.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current subscription details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"
        "401":
          description: Unauthorized

  /subscription/subscribe:
    post:
      tags: [Module 12 — Subscription]
      summary: Subscribe or upgrade plan
      description: Activates a subscription for the authenticated user.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [plan]
              properties:
                plan:
                  type: string
                  enum: [pro, pro_unlimited]
      responses:
        "200":
          description: Subscription activated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Subscription activated
                  subscription:
                    $ref: "#/components/schemas/Subscription"
        "400":
          description: Invalid plan or already subscribed
        "402":
          description: Payment failed

  /subscription/cancel:
    post:
      tags: [Module 12 — Subscription]
      summary: Cancel subscription
      description: Cancels the user's subscription at the end of the billing period.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Subscription cancellation scheduled
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Subscription will cancel at period end
                  expiresAt:
                    type: string
                    format: date-time

  /payments/me:
    get:
      tags: [Module 12 — Subscription]
      summary: Get payment history
      description: Returns a list of payments associated with the authenticated user's subscription.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of past payments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentHistoryResponse"

# ==============================================================================
# COMPONENTS
# ==============================================================================
components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    trackId:
      name: trackId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Unique track identifier

    commentId:
      name: commentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Unique comment identifier

    playlistId:
      name: playlistId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Unique playlist identifier

  responses:
    Unauthorized:
      description: Authentication required or session invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: UNAUTHORIZED
              message: User session invalid. Please log in again.

    BadRequest:
      description: Invalid request body
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    ServerError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: SERVER_ERROR
              message: Unexpected server error occurred.

    PlaylistNotFound:
      description: Playlist not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: PLAYLIST_NOT_FOUND
              message: Playlist not found.

  schemas:

    # ==========================================================================
    # SHARED / COMMON
    # ==========================================================================

    # Note: ErrorResponse is the Module 5/11 style; Error is the Module 4/7 style.
    # Both are preserved as different schemas exist across modules.

    ErrorResponse:
      type: object
      description: Unified error format returned by all endpoints on failure.
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              example: TRACK_BLOCKED
            message:
              type: string
              example: This track is not available in your region or tier
            statusCode:
              type: integer
              example: 403

    Error:
      type: object
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string

    PaginationMeta:
      type: object
      description: Metadata included in all paginated responses.
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 100

    # ==========================================================================
    # MODULES 1–3 — Auth, Users, Followers
    # ==========================================================================

    User:
      type: object
      properties:
        id:
          type: string
          example: uuid
        username:
          type: string
          example: john_doe
        email:
          type: string
          example: john@email.com
        avatarUrl:
          type: string
          nullable: true
        isVerified:
          type: boolean
          example: false
        createdAt:
          type: string
          format: date-time

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        accessToken:
          type: string
          example: jwt_access_token
        refreshToken:
          type: string
          example: jwt_refresh_token

    auth_register_body:
      required: [email, password, username]
      type: object
      properties:
        username:
          type: string
          example: john_doe
        email:
          type: string
          example: john@email.com
        password:
          type: string
          example: StrongPassword123!
        avatarUrl:
          type: string
          nullable: true

    auth_login_body:
      required: [email, password]
      type: object
      properties:
        email:
          type: string
          example: john@email.com
        password:
          type: string
          example: StrongPassword123!

    auth_refreshtoken_body:
      required: [refreshToken]
      type: object
      properties:
        refreshToken:
          type: string
          example: existing_refresh_token

    auth_logout_body:
      required: [refreshToken]
      type: object
      properties:
        refreshToken:
          type: string
          example: current_refresh_token

    auth_verifyemail_body:
      required: [token]
      type: object
      properties:
        token:
          type: string
