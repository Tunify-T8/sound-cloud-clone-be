            application/json:
              schema:
                $ref: "#/components/schemas/LikeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Track not found

    delete:
      operationId: unlikeTrack
      summary: Unlike Track
      tags: [Module 6 — Engagement]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/trackId"
      responses:
        "200":
          description: Track unliked — returns updated like count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LikeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Track not found

  /tracks/{trackId}/repost:
    post:
      operationId: repostTrack
      summary: Repost Track
      tags: [Module 6 — Engagement]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/trackId"
      responses:
        "200":
          description: Track reposted — returns updated repost count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepostResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Track not found

    delete:
      operationId: undoRepostTrack
      summary: Remove Repost (Undo Repost)
      tags: [Module 6 — Engagement]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/trackId"
      responses:
        "200":
          description: Repost removed — returns updated repost count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepostResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Track not found

  /tracks/{trackId}/likes:
    get:
      operationId: getTrackLikeUsers
