          type: boolean
          default: false
        includeInRSS:
          type: boolean
          default: true
        displayEmbedCode:
          type: boolean
          default: true
        enableAppPlayback:
          type: boolean
          default: true
        allowComments:
          type: boolean
          default: true
        showCommentsPublic:
          type: boolean
          default: true
        showInsightsPublic:
          type: boolean
          default: false

    AudioMetadata:
      type: object
      properties:
        bitrateKbps:
          type: integer
          example: 320
        sampleRateHz:
          type: integer
          example: 44100
        format:
          type: string
