              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Report submitted

  /admin/reports:
    get:
      tags: [Module 11 — Admin Reports]
      summary: Get reports queue
      description: Returns a paginated, filterable list of submitted reports for admin review.
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, RESOLVED, REJECTED]
        - name: entityType
          in: query
          schema:
            type: string
            enum: [TRACK, COMMENT, USER]
        - name: reasonId
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
