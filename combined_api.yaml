        - $ref: "#/components/parameters/trackId"
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Paginated list of users who liked the track
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedEngagementUsers"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Track not found

  /tracks/{trackId}/reposts:
    get:
      operationId: getTrackRepostUsers
      summary: Get Users Who Reposted Track
      description: Returns a paginated list of users who reposted the track.
      tags: [Module 6 — Engagement]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/trackId"
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Paginated list of users who reposted the track
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedEngagementUsers"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Track not found

  /tracks/{trackId}/comments:
    get:
      operationId: getTrackComments
      summary: Get Track Comments (Paginated)
      description: Returns paginated comment list. Does NOT return nested replies in this response.
      tags: [Module 6 — Engagement]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/trackId"
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Paginated list of comments (without nested replies)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedComments"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Track not found

    post:
      operationId: postComment
      summary: Post Comment on Track
      tags: [Module 6 — Engagement]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/trackId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
                  maxLength: 1000
            example:
              text: Great track!
      responses:
        "201":
          description: Comment created — returns full comment object + updated commentsCount
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentWithCount"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Track not found

  /comments/{commentId}/replies:
    get:
      operationId: getCommentReplies
      summary: Get Comment Replies (Paginated)
      description: Returns paginated replies for a specific comment.
      tags: [Module 6 — Engagement]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/commentId"
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 5
            minimum: 1
            maximum: 50
      responses:
        "200":
          description: Paginated list of replies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedReplies"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Comment not found

    post:
      operationId: replyToComment
      summary: Reply to Comment
      tags: [Module 6 — Engagement]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/commentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
                  maxLength: 1000
            example:
              text: Thanks!
      responses:
        "201":
          description: Reply created — returns full reply object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reply"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Comment not found

  /comments/{commentId}:
    delete:
      operationId: deleteComment
      summary: Delete Comment
      tags: [Module 6 — Engagement]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/commentId"
      responses:
        "200":
          description: Comment deleted — returns updated commentsCount
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  commentsCount:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Comment not found

  /comments/{commentId}/like:
    post:
      operationId: likeComment
      summary: Like a Comment
      tags: [Module 6 — Engagement]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/commentId"
      responses:
        "200":
          description: Comment liked — returns updated likesCount
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentLikeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Comment not found

    delete:
      operationId: unlikeComment
      summary: Unlike a Comment
      tags: [Module 6 — Engagement]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/commentId"
      responses:
        "200":
          description: Comment unliked — returns updated likesCount
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentLikeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Comment not found

  # ============================================================================
  # MODULE 7 — Playlists
  # ============================================================================

  /playlists:
    post:
      operationId: createPlaylist
      summary: Create Playlist
      description: User creates a new playlist.
      tags: [Module 7 — Playlists]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CreatePlaylistRequest"
      responses:
        "201":
          description: Playlist created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePlaylistResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          description: Playlist limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /playlists/{playlistId}:
    get:
      operationId: getPlaylistDetails
      summary: Get Playlist Details (Full Object)
      tags: [Module 7 — Playlists]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/playlistId"
        - name: viewerId
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Full playlist object with tracks, analytics and viewer context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaylistDetails"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Playlist access denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/PlaylistNotFound"

    put:
      operationId: editPlaylist
      summary: Edit Playlist
      tags: [Module 7 — Playlists]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/playlistId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/EditPlaylistRequest"
      responses:
        "200":
          description: Playlist updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EditPlaylistResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/PlaylistNotFound"

    delete:
      operationId: deletePlaylist
      summary: Delete Playlist
      description: Soft delete. Recoverable within 30 days.
      tags: [Module 7 — Playlists]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/playlistId"
      responses:
        "200":
          description: Playlist soft-deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  playlistId:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum: [deleted]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/PlaylistNotFound"

  /playlists/{playlistId}/tracks:
    get:
      operationId: getPlaylistTracks
      summary: Get Playlist Tracks (Paginated)
      description: For large playlists (100+ tracks), use cursor-based pagination.
      tags: [Module 7 — Playlists]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/playlistId"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: cursor
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Paginated track list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedPlaylistTracks"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/PlaylistNotFound"

  /playlists/{playlistId}/tracks/add:
    post:
      operationId: addTrackToPlaylist
      summary: Add Track to Playlist
      description: New tracks always append to the end.
      tags: [Module 7 — Playlists]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/playlistId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [trackId]
              properties:
                trackId:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Track added to playlist
          content:
            application/json:
              schema:
                type: object
                properties:
                  playlistId:
                    type: string
                    format: uuid
                  tracksCount:
                    type: integer
                  updatedAt:
                    type: string
                    format: date-time
        "400":
          description: Duplicate track
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/PlaylistNotFound"

  /playlists/{playlistId}/tracks/remove:
    post:
      operationId: removeTrackFromPlaylist
      summary: Remove Track from Playlist
      tags: [Module 7 — Playlists]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/playlistId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [trackId]
              properties:
                trackId:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Track removed from playlist
          content:
            application/json:
              schema:
                type: object
                properties:
                  playlistId:
                    type: string
                    format: uuid
                  tracksCount:
                    type: integer
                  totalDurationSeconds:
                    type: integer
                  updatedAt:
                    type: string
                    format: date-time
        "400":
          description: Track not in playlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/PlaylistNotFound"

  /playlists/{playlistId}/tracks/reorder:
    put:
      operationId: reorderPlaylistTracks
      summary: Reorder Playlist Tracks
      description: trackOrder rewrites the full array. New tracks always append to end.
      tags: [Module 7 — Playlists]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/playlistId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [trackOrder]
              properties:
                trackOrder:
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        "200":
          description: Track order updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  playlistId:
                    type: string
                    format: uuid
                  message:
                    type: string
                  updatedAt:
                    type: string
                    format: date-time
        "400":
          description: Invalid track order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/PlaylistNotFound"

  /playlists/{playlistId}/like:
    post:
      operationId: likePlaylist
      summary: Like Playlist
      tags: [Module 7 — Playlists]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/playlistId"
      responses:
        "200":
          description: Playlist liked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaylistLikeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/PlaylistNotFound"

    delete:
      operationId: unlikePlaylist
      summary: Unlike Playlist
      tags: [Module 7 — Playlists]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/playlistId"
      responses:
        "200":
          description: Playlist unliked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaylistLikeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/PlaylistNotFound"

  /playlists/{playlistId}/save:
    post:
      operationId: savePlaylistToLibrary
      summary: Save Playlist to Library
      tags: [Module 7 — Playlists]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/playlistId"
      responses:
        "200":
          description: Playlist saved to library
          content:
            application/json:
              schema:
                type: object
                properties:
                  playlistId:
                    type: string
                    format: uuid
                  isSaved:
                    type: boolean
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/PlaylistNotFound"

  /playlists/{playlistId}/repost:
    post:
      operationId: repostPlaylist
      summary: Repost Playlist
      tags: [Module 7 — Playlists]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/playlistId"
      responses:
        "200":
          description: Playlist reposted
          content:
            application/json:
              schema:
                type: object
                properties:
                  playlistId:
                    type: string
                    format: uuid
                  isReposted:
                    type: boolean
                  repostsCount:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/PlaylistNotFound"

  /playlists/{playlistId}/embed:
    get:
      operationId: getPlaylistEmbed
      summary: Get Playlist Embed Code
      tags: [Module 7 — Playlists]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/playlistId"
      responses:
        "200":
          description: Embed code and URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  embedCode:
                    type: string
                  embedUrl:
                    type: string
                    format: uri
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/PlaylistNotFound"

  /playlists/{playlistId}/play:
    post:
      operationId: startPlaylistPlayback
      summary: Smart Playback Context
      description: When user presses Play on a playlist, returns the play queue.
      tags: [Module 7 — Playlists]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/playlistId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                startTrackId:
                  type: string
                  format: uuid
                shuffle:
                  type: boolean
                  default: false
      responses:
        "200":
          description: Playback queue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaybackContext"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/PlaylistNotFound"

  /playlists/import:
    post:
      operationId: importPlaylist
      summary: Import Playlist from External Provider
      tags: [Module 7 — Playlists]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportPlaylistRequest"
      responses:
        "201":
          description: Playlist imported
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportPlaylistResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/{username}/playlists:
    get:
      operationId: getUserPlaylists
      summary: Get User's Playlists
      tags: [Module 7 — Playlists]
      security:
        - bearerAuth: []
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: privacy
          in: query
          required: false
          schema:
            type: string
            enum: [public, all]
            default: public
      responses:
        "200":
          description: Paginated list of user's playlists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPlaylistsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: User not found

  # ============================================================================
  # MODULE 8 — Feed, Search & Discovery
  # ============================================================================

  /feed:
    get:
      tags: [Module 8 — Feed & Discovery]
      summary: Get chronological feed
      description: |
        Returns a paginated feed of tracks and reposts from users the authenticated user follows.
        Results are ordered by most recent activity.
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: includeReposts
          schema:
            type: boolean
            default: true
        - in: query
          name: sinceTimestamp
          schema:
            type: string
            format: date-time
          description: Optional timestamp to fetch only items after this time.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Paginated feed items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedFeedResponse"
        "401":
          description: Unauthorized
        "400":
          description: Invalid query parameters

  /resolve:
    get:
      tags: [Module 8 — Feed & Discovery]
      summary: Resolve a public permalink URL to a resource
      description: Resolves a public SoundCloud-style permalink URL into the corresponding internal resource.
      parameters:
        - in: query
          name: url
          required: true
          schema:
            type: string
            format: uri
      responses:
        "200":
          description: Successfully resolved resource
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolvedResourceResponse"
        "400":
          description: Invalid or malformed URL
        "404":
          description: Resource could not be resolved

  /discover:
    get:
      tags: [Module 8 — Feed & Discovery]
      summary: Get discovery items
      description: Returns generic discovery items. If authenticated, personalized recommendations may be included.
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: page
          schema:
            type: integer
            default: 1
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Paginated discovery items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedDiscoveryResponse"

  /trending:
    get:
      tags: [Module 8 — Feed & Discovery]
      summary: Get trending items
      description: Returns trending items including tracks, playlists, or users.
      parameters:
        - in: query
          name: type
          schema:
            type: string
            enum: [track, playlist, user]
            default: track
        - in: query
          name: since
          schema:
            type: string
            enum: [day, week, month]
            default: week
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - in: query
          name: page
          schema:
            type: integer
            default: 1
            minimum: 1
      responses:
        "200":
          description: Paginated list of trending items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedTrendingResponse"
        "400":
          description: Invalid query parameters

  /artists/suggested:
    get:
      tags: [Module 8 — Feed & Discovery]
      summary: Get suggested artists the user does not follow
      description: Returns a paginated list of suggested artists. Artists already followed are never included.
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 50
        - in: query
          name: page
          schema:
            type: integer
            default: 1
            minimum: 1
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Paginated suggested artists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedSuggestedArtistsResponse"
        "401":
          description: Unauthorized
        "400":
          description: Invalid query parameters

  /search:
    get:
      tags: [Module 8 — Feed & Discovery]
      summary: Global search across tracks, collections, and users
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - in: query
          name: page
          schema:
            type: integer
            default: 1
            minimum: 1
      responses:
        "200":
          description: Paginated search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedSearchResponse"
        "400":
          description: Invalid query parameters

  /search/tracks:
    get:
      tags: [Module 8 — Feed & Discovery]
      summary: Search tracks with predefined filters
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
        - in: query
          name: tag
          schema:
            type: string
        - in: query
          name: timeAdded
          schema:
            type: string
            enum: [past_hour, past_day, past_week, past_month, past_year, all_time]
        - in: query
          name: duration
          schema:
            type: string
            enum: [lt_2, 2_10, 10_30, gt_30, any_length]
        - in: query
          name: toListen
          schema:
            type: string
            enum: [streamable, shareable, modify_commercially, use_commercially]
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: page
          schema:
            type: integer
            default: 1
      responses:
        "200":
          description: Paginated track search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedTrackSearchResponse"

  /search/collections:
    get:
      tags: [Module 8 — Feed & Discovery]
      summary: Search albums or playlists
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
        - in: query
          name: type
          schema:
            type: string
            enum: [album, playlist]
        - in: query
          name: tag
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: page
          schema:
            type: integer
            default: 1
      responses:
        "200":
          description: Paginated collection search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedCollectionSearchResponse"

  /search/people:
    get:
      tags: [Module 8 — Feed & Discovery]
      summary: Search users (artists or listeners)
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
        - in: query
          name: location
          schema:
            type: string
        - in: query
          name: minFollowers
          schema:
            type: integer
        - in: query
          name: verifiedOnly
          schema:
            type: boolean
        - in: query
          name: sort
          schema:
            type: string
            enum: [relevance, followers]
            default: relevance
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: page
          schema:
            type: integer
            default: 1
      responses:
        "200":
          description: Paginated user search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedUserSearchResponse"

  # ============================================================================
  # MODULE 9 — Messaging & Track Sharing
  # ============================================================================

  /me/conversations:
    get:
      tags: [Module 9 — Messaging]
      summary: Get user conversations
      description: Returns a paginated list of conversations for the authenticated user.
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: page
          schema:
            type: integer
            default: 1
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Paginated list of conversations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedConversationResponse"
        "401":
          description: Unauthorized

    post:
      tags: [Module 9 — Messaging]
      summary: Create or get conversation with a user
      description: Creates a conversation or returns the existing one.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                userId:
                  type: string
                  example: "46021"
      responses:
        "200":
          description: Conversation created or retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversationId:
                    type: string
                    example: "46021:1676210768"

  /conversations/{conversationId}:
    delete:
      tags: [Module 9 — Messaging]
      summary: Delete conversation
      description: Deletes the conversation from the authenticated user's inbox.
      parameters:
        - in: path
          name: conversationId
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Conversation deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Conversation deleted

  /conversations/{conversationId}/messages:
    get:
      tags: [Module 9 — Messaging]
      summary: Get messages in conversation
      description: Returns paginated messages belonging to a conversation.
      parameters:
        - in: path
          name: conversationId
          required: true
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: page
          schema:
            type: integer
            default: 1
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Paginated messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedMessageResponse"
        "401":
          description: Unauthorized
        "404":
          description: Conversation not found

    post:
      tags: [Module 9 — Messaging]
      summary: Send message in conversation
      description: Sends a message. Messages may contain plain text or attachments.
      parameters:
        - in: path
          name: conversationId
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMessageRequest"
      responses:
        "201":
          description: Message successfully sent
        "400":
          description: Invalid request payload
        "401":
          description: Unauthorized

  /conversations/{conversationId}/read:
    post:
      tags: [Module 9 — Messaging]
      summary: Mark conversation as read
      description: Marks all unread messages in the conversation as read.
      parameters:
        - in: path
          name: conversationId
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Conversation marked as read

  /me/messages/unread-count:
    get:
      tags: [Module 9 — Messaging]
      summary: Get total unread message count
      description: Returns the total number of unread messages across all conversations.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Total unread messages
          content:
            application/json:
              schema:
                type: object
                properties:
                  unreadCount:
                    type: integer
                    example: 5

  /conversations/{conversationId}/block:
    post:
      tags: [Module 9 — Messaging]
      summary: Block user from conversation
      description: Blocks the other user in the conversation and prevents further messaging.
      parameters:
        - in: path
          name: conversationId
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User blocked
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: User blocked. Messaging disabled.

  # ============================================================================
  # MODULE 10 — Notifications
  # ============================================================================

  /notifications:
    get:
      tags: [Module 10 — Notifications]
      summary: Get notifications for the authenticated user
      description: Returns a paginated list of notifications ordered by most recent first.
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 50
        - name: type
          in: query
          schema:
            type: string
          description: Filter by notification type. Accepts comma-separated list.
          example: like,comment
        - name: unread
          in: query
          schema:
            type: boolean
          description: If true, returns only unread notifications.
      responses:
        "200":
          description: Notifications returned.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/NotificationObject"
                  meta:
                    allOf:
                      - $ref: "#/components/schemas/PaginationMeta"
                      - type: object
                        properties:
                          unreadCount:
                            type: integer
                            example: 5
        "400":
          description: Invalid type filter value.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notifications/unread-count:
    get:
      tags: [Module 10 — Notifications]
      summary: Get unread notification count
      description: Returns only the unread notification count without fetching records.
      responses:
        "200":
          description: Unread count returned.
          content:
            application/json:
              schema:
                type: object
                properties:
                  unreadCount:
                    type: integer
                    example: 4

  /notifications/read-all:
    patch:
      tags: [Module 10 — Notifications]
      summary: Mark all notifications as read
      description: Sets is_read = true on all unread notifications for the authenticated user.
      responses:
        "200":
          description: All notifications marked as read.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: All notifications marked as read
                  updatedCount:
                    type: integer
                    example: 12

  /notifications/{notificationId}:
    patch:
      tags: [Module 10 — Notifications]
      summary: Mark a single notification as read
      description: Sets is_read = true on a specific notification.
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Notification marked as read.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Notification marked as read
        "403":
          description: Notification belongs to a different user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Notification not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notifications/preferences:
    get:
      tags: [Module 10 — Notifications]
      summary: Get notification preferences
      description: Returns the authenticated user's current notification preferences.
      responses:
        "200":
          description: Notification preferences returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationPreferences"

    patch:
      tags: [Module 10 — Notifications]
      summary: Update notification preferences
      description: Partially updates notification preferences. Only included fields are updated.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                push:
                  type: object
                  additionalProperties:
                    type: boolean
                email:
                  type: object
                  additionalProperties:
                    type: boolean
            example:
              push:
                newFollower: false
                promotions: false
      responses:
        "200":
          description: Preferences updated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Preferences updated successfully
        "400":
          description: Unknown preference key or invalid value type.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ============================================================================
  # MODULE 11 — Moderation & Admin Dashboard
  # ============================================================================

  /reports/reasons:
    get:
      tags: [Module 11 — Reports (User-Facing)]
      summary: Get available report reasons
      description: Returns the list of report reasons from the report_reason table.
      security: []
      responses:
        "200":
          description: List of report reasons.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReportReason"

  /reports:
    post:
      tags: [Module 11 — Reports (User-Facing)]
      summary: Submit a report
      description: Submits a report against a track, comment, or user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reportedEntityType, reportedEntityId, reasonId]
              properties:
                reportedEntityType:
                  type: string
                  enum: [TRACK, COMMENT, USER]
                reportedEntityId:
                  type: string
                  format: uuid
                reasonId:
                  type: string
                  example: hate_speech
                detailsText:
                  type: string
                  nullable: true
                violationAreas:
                  type: array
                  items:
                    type: string
                    enum: [AUDIO, ARTWORK, TITLE, DESCRIPTION]
      responses:
        "201":
          description: Report submitted successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Report submitted
        "400":
          description: Invalid or unrecognized reasonId.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: The reported entity was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reports/spam:
    post:
      tags: [Module 11 — Reports (User-Facing)]
