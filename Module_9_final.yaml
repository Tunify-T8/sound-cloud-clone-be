openapi: 3.0.0
info:
  title: Messaging & Track Sharing API
  version: 1.0.0
  description: Real-time messaging system with WebSocket support and user blocking

servers:
  - url: http://localhost:3000
    description: Development server

paths:
  /users/me/conversations:
    get:
      summary: Get all conversations for current user
      tags:
        - Conversations
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: Page number
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
          description: Conversations per page
      responses:
        '200':
          description: Conversations retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetConversationsResponse'
        '401':
          description: Unauthorized

    post:
      summary: Create or retrieve existing conversation
      tags:
        - Conversations
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userId
              properties:
                userId:
                  type: string
                  format: uuid
                  description: Other user ID
      responses:
        '200':
          description: Conversation created or retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateConversationResponse'
        '400':
          description: Invalid request (self-messaging, allowMessages restricted)
        '401':
          description: Unauthorized
        '404':
          description: User not found

  /conversations/{conversationId}:
    delete:
      summary: Delete a conversation
      tags:
        - Conversations
      security:
        - BearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Conversation ID to delete
      responses:
        '200':
          description: Conversation deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteConversationResponse'
        '401':
          description: Unauthorized
        '403':
          description: Not part of this conversation
        '404':
          description: Conversation not found

  /conversations/{conversationId}/messages:
    get:
      summary: Get messages in a conversation
      tags:
        - Messages
      security:
        - BearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Conversation ID
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: Page number
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
          description: Messages per page
      responses:
        '200':
          description: Messages retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetMessagesResponse'
        '401':
          description: Unauthorized
        '403':
          description: Blocked by user or not part of conversation
        '404':
          description: Conversation not found

  /conversations/{conversationId}/read:
    post:
      summary: Mark conversation as read
      tags:
        - Conversations
      security:
        - BearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Conversation ID
      responses:
        '200':
          description: Conversation marked as read
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarkReadResponse'
        '401':
          description: Unauthorized
        '404':
          description: Conversation not found

  /conversations/{conversationId}/unread:
    post:
      summary: Mark conversation as unread
      tags:
        - Conversations
      security:
        - BearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Conversation ID
      responses:
        '200':
          description: Conversation marked as unread
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarkUnreadResponse'
        '401':
          description: Unauthorized
        '404':
          description: Conversation not found

  /conversations/{conversationId}/archive:
    post:
      summary: Archive a conversation
      tags:
        - Conversations
      security:
        - BearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Conversation ID
      responses:
        '200':
          description: Conversation archived successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArchiveConversationResponse'
        '401':
          description: Unauthorized
        '403':
          description: Not part of this conversation
        '404':
          description: Conversation not found

    delete:
      summary: Unarchive a conversation
      tags:
        - Conversations
      security:
        - BearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Conversation ID
      responses:
        '200':
          description: Conversation unarchived successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnarchiveConversationResponse'
        '401':
          description: Unauthorized
        '403':
          description: Not part of this conversation
        '404':
          description: Conversation not found

  /conversations/{conversationId}/block:
    post:
      summary: Block a user from a conversation
      tags:
        - Conversations
      security:
        - BearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Conversation ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                removeComments:
                  type: boolean
                  description: Remove all comments from blocked user
                reportSpam:
                  type: boolean
                  description: Mark user as spam reporter
      responses:
        '200':
          description: User blocked successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlockUserResponse'
        '401':
          description: Unauthorized
        '403':
          description: Not part of this conversation
        '404':
          description: Conversation not found

  /conversations/unblock/{blockedUserId}:
    post:
      summary: Unblock a previously blocked user
      tags:
        - Conversations
      security:
        - BearerAuth: []
      parameters:
        - name: blockedUserId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: User ID to unblock
      responses:
        '200':
          description: User unblocked successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnblockUserResponse'
        '401':
          description: Unauthorized
        '404':
          description: User not blocked

  /users/me/messages/unread-count:
    get:
      summary: Get unread message count
      tags:
        - Messages
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Unread count retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnreadCountResponse'
        '401':
          description: Unauthorized

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    GetConversationsResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ConversationItem'
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer
        hasNextPage:
          type: boolean
        hasPreviousPage:
          type: boolean

    ConversationItem:
      type: object
      properties:
        conversationId:
          type: string
          format: uuid
        otherUser:
          type: object
          properties:
            id:
              type: string
              format: uuid
            displayName:
              type: string
            avatarUrl:
              type: string
              nullable: true
        lastMessagePreview:
          type: string
          nullable: true
        lastMessageAt:
          type: string
          format: date-time
          nullable: true
        unreadCount:
          type: integer

    CreateConversationResponse:
      type: object
      properties:
        conversationId:
          type: string
          format: uuid
        message:
          type: string
          nullable: true

    DeleteConversationResponse:
      type: object
      properties:
        message:
          type: string

    GetMessagesResponse:
      type: object
      properties:
        conversationId:
          type: string
          format: uuid
        messages:
          type: array
          items:
            $ref: '#/components/schemas/Message'
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer
        hasNextPage:
          type: boolean
        hasPreviousPage:
          type: boolean

    Message:
      type: object
      properties:
        id:
          type: string
          format: uuid
        sender:
          type: object
          properties:
            id:
              type: string
              format: uuid
            username:
              type: string
            avatarUrl:
              type: string
              nullable: true
        type:
          type: string
          enum:
            - TEXT
            - TRACK_LIKE
            - TRACK_UPLOAD
            - PLAYLIST
            - ALBUM
            - USER
        text:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        attachment:
          type: object
          properties:
            id:
              type: string
              format: uuid
              nullable: true
            type:
              type: string
              enum:
                - TEXT
                - TRACK_LIKE
                - TRACK_UPLOAD
                - PLAYLIST
                - ALBUM
                - USER
            preview:
              type: object
              nullable: true

    MarkReadResponse:
      type: object
      properties:
        message:
          type: string

    MarkUnreadResponse:
      type: object
      properties:
        message:
          type: string

    ArchiveConversationResponse:
      type: object
      properties:
        message:
          type: string

    UnarchiveConversationResponse:
      type: object
      properties:
        message:
          type: string

    BlockUserResponse:
      type: object
      properties:
        message:
          type: string
        blockedUserId:
          type: string
          format: uuid
        blockId:
          type: string
          format: uuid

    UnblockUserResponse:
      type: object
      properties:
        message:
          type: string

    UnreadCountResponse:
      type: object
      properties:
        unreadCount:
          type: integer

tags:
  - name: Conversations
    description: Conversation management endpoints
  - name: Messages
    description: Message retrieval endpoints
