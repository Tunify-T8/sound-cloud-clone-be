name: CI/CD

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      

  docker:
    name: Docker Build (Test + Build)
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t soundcloud-backend .

  push:
    name: Push to Docker Hub
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          docker build \
            -t amirdiaa/soundcloud-backend:latest \
            -t amirdiaa/soundcloud-backend:${{ github.sha }} .
          docker push amirdiaa/soundcloud-backend:latest
          docker push amirdiaa/soundcloud-backend:${{ github.sha }}

  deploy:
    name: Deploy to Azure
    needs: push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.DEPLOY_AZURE == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: soundcloud-t8-backend
          images: amirdiaa/soundcloud-backend:${{ github.sha }}
